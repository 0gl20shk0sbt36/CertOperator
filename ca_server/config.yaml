server:
  host: "0.0.0.0"
  port: 8443
  san: ""

ca:
  key_type: ed25519
  validity_hours: 1

totp:
  issuer: "CertOperator"
  account: "admin"

rate_limit:
  max_attempts: 5
  window_seconds: 300

groups:
  default:
    allowed_users: ""
    validity_hours: 1
    totp_secret: ""
    parent: ""           # 父组名（空=无上级）
    extensions: {}       # 证书扩展（如 sudo: "yes"），子组覆盖父组
