ca:
  key_type: ed25519
  validity_hours: 1
groups:
  base-with-sudo:
    allowed_users: ''
    extensions:
      sudo: 'yes'
    parent: ''
    validity_hours: 1
  child-inherit:
    allowed_users: ''
    extensions: {}
    parent: base-with-sudo
    validity_hours: 1
  test:
    allowed_users: ''
    extensions:
      sudo: 'yes'
    parent: ''
    validity_hours: 1
rate_limit:
  max_attempts: 5
  window_seconds: 300
server:
  host: 0.0.0.0
  port: 8443
  san: ''
totp:
  account: admin
  issuer: CertOperator
