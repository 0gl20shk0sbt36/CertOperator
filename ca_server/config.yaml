server:
  host: "0.0.0.0"
  port: 8443
  san: ""

ca:
  key_type: ed25519
  validity_hours: 1
  allowed_users: ""

totp:
  issuer: "CertOperator"
  account: "admin"

rate_limit:
  max_attempts: 5
  window_seconds: 300

# 组配置（可选）。不配置时使用全局 totp 和 ca 设置。
# 每个组可覆盖 totp_secret、validity_hours、allowed_users、rate_limit。
groups: {}
