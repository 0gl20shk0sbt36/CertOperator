version: "3.9"

services:
  ca-server:
    build:
      context: ..
      dockerfile: test/docker-compose/Dockerfile.ca
    container_name: cert-ca
    hostname: ca-server
    ports:
      - "2225:22"
      - "8443:8443"

  test-target:
    build:
      context: ..
      dockerfile: test/docker-compose/Dockerfile.target
    container_name: cert-target
    hostname: test-target
    ports:
      - "2224:22"

