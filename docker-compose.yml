# cert-operator 测试环境
#
# 启动：docker compose up -d --build
# 停止：docker compose down -v
#
# 包含两个干净的 Ubuntu 22.04 容器，可 SSH 进入手动测试：
#   ca-server   (端口 2225 → 22, 8443 → 8443)
#   test-target (端口 2224 → 22)
#
# 测试流程示例：
#   1. ssh tester@localhost -p 2225   # 进 ca-server
#   2. ssh testuser@localhost -p 2224  # 进 test-target
#
version: "3.9"

services:
  ca-server:
    build:
      context: .
      dockerfile: docker-compose/Dockerfile.ca
    container_name: cert-ca
    hostname: ca-server
    ports:
      - "2225:22"
      - "8443:8443"

  test-target:
    build:
      context: .
      dockerfile: docker-compose/Dockerfile.target
    container_name: cert-target
    hostname: test-target
    ports:
      - "2224:22"
